<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sustainable Web Analyzer | Analisi di Sostenibilità Web Professionale{% endblock %}</title>

    <!-- Font moderni e professionali -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icone e animazioni -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <!-- CSS - Carica tutti i file individualmente invece di usare @import -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/variables.css') }}">

    <!-- Componenti -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/tables.css') }}">

    <!-- Utilities -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/responsive.css') }}">

    <!-- Base CSS (senza gli @import) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- CSS specifici per pagina -->
    {% block css %}{% endblock %}
</head>
<body>
{% include 'partials/header.html' %}

{% block content %}{% endblock %}

{% include 'partials/footer.html' %}

<!-- JS principale -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<!-- JS specifici per pagina -->
{% block js %}{% endblock %}
</body>
</html>

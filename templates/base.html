<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sustainable Web Analyzer | Analisi di Sostenibilità Web Professionale{% endblock %}</title>

    <!-- Previeni Flash Of Unstyled Content con theme init script -->
    <script>
        // Inizializzazione tema precoce - defaulta a light mode
        (function() {
            const savedTheme = localStorage.getItem('theme');

            // Usa il tema salvato, altrimenti defaulta a light
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <!-- Font moderni e professionali -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icone e animazioni -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <!-- CSS - Carica tutti i file individualmente invece di usare @import -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/variables.css') }}">

    <!-- Tema - Caricato presto nel DOM per evitare FOUC (Flash of Unstyled Content) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/theme.css') }}">

    <!-- Componenti -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/cards.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/tables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/enhanced-dashboard.css') }}">

    <!-- Utilities -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/responsive.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/loading.css') }}">

    <!-- Base CSS (senza gli @import) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- CSS specifici per pagina -->
    {% block css %}{% endblock %}
</head>
<body>
{% include 'partials/header.html' %}

<main id="main-content">
    {% block content %}{% endblock %}
</main>

{% include 'partials/footer.html' %}

<!-- JS principale (moduli ES) -->
<script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>

<!-- JS specifici per pagina -->
{% block js %}{% endblock %}
</body>
</html>
